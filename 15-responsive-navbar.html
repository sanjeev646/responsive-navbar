<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Responsive Navbar</title>
<style>
  * { margin: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; }

  nav {
    background: #222;
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 25px;
  }
  .logo { font-size: 20px; font-weight: bold; }
  .nav-links {
    list-style: none;
    display: flex;
    gap: 25px;
  }
  .nav-links a {
    color: white;
    text-decoration: none;
  }
  .nav-links a:hover { color: #66b3ff; }

  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    background: none;
    border: none;
  }
  .hamburger span {
    width: 25px;
    height: 3px;
    background: white;
  }

  /* Mobile view */
  @media (max-width: 600px) {
    .nav-links {
      position: absolute;
      top: 60px;
      left: 0;
      right: 0;
      background: #222;
      flex-direction: column;
      align-items: center;
      padding: 15px 0;
      display: none;
    }
    .nav-links.show { display: flex; }
    .hamburger { display: flex; }
  }

  main { padding: 30px; }
</style>
</head>
<body>

  <nav>
    <div class="logo">MySite</div>
    <ul class="nav-links" id="navLinks">
      <li><a href="#">Home</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Services</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
    <button class="hamburger" onclick="toggleMenu()">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <main>
    <h1>Welcome</h1>
    <p>Resize the browser window to see the navbar collapse into a hamburger menu on small screens.</p>
  </main>

  <script>
    function toggleMenu() {
      document.getElementById('navLinks').classList.toggle('show');
    }
  </script>

</body>
</html>
